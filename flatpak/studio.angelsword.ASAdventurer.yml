# Flatpak manifest — AS Adventurer
# Build & install:  ./flatpak/build.sh
# Shareable bundle: flatpak/dist/studio.angelsword.ASAdventurer.flatpak

id: studio.angelsword.ASAdventurer
runtime: org.freedesktop.Platform
runtime-version: '24.08'
sdk: org.freedesktop.Sdk
command: as-adventurer

finish-args:
  # Local HTTP server + UDP face-tracking (VTS / iFacialMocap)
  - --share=network
  # Host browser open via xdg-desktop-portal
  - --socket=fallback-x11
  - --socket=wayland
  - --share=ipc
  - --device=dri
  # Logs/state live in ~/.var/app/studio.angelsword.ASAdventurer/ by default
  - --talk-name=org.freedesktop.portal.Desktop
  - --talk-name=org.freedesktop.portal.OpenURI

cleanup:
  - /include
  - /share/man
  - /share/doc
  - '*.a'

modules:
  - name: node
    buildsystem: simple
    build-commands:
      - install -Dm755 bin/node /app/bin/node
    sources:
      - type: archive
        url: https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-x64.tar.xz
        sha256: 69b09dba5c8dcb05c4e4273a4340db1005abeafe3927efda2bc5b249e80437ec
        only-arches: [x86_64]
      - type: archive
        url: https://nodejs.org/dist/v22.14.0/node-v22.14.0-linux-arm64.tar.xz
        sha256: 08bfbf538bad0e8cbb0269f0173cca28d705874a67a22f60b57d99dc99e30050
        only-arches: [aarch64]

  - name: as-adventurer
    buildsystem: simple
    build-commands:
      - install -d /app/share/as-adventurer
      - cp -a server.js package.json package-lock.json /app/share/as-adventurer/
      - cp -a public /app/share/as-adventurer/
      - cp -a node_modules /app/share/as-adventurer/
      - install -Dm755 flatpak/as-adventurer-launcher.sh /app/bin/as-adventurer
      - install -Dm644 flatpak/studio.angelsword.ASAdventurer.desktop
          /app/share/applications/studio.angelsword.ASAdventurer.desktop
      - install -Dm644 flatpak/studio.angelsword.ASAdventurer.metainfo.xml
          /app/share/metainfo/studio.angelsword.ASAdventurer.metainfo.xml
      - |
        for s in 64 128 256; do
          install -Dm644 "flatpak/icons/hicolor/${s}x${s}/apps/studio.angelsword.ASAdventurer.png" \
            "/app/share/icons/hicolor/${s}x${s}/apps/studio.angelsword.ASAdventurer.png"
        done
    sources:
      - type: dir
        path: ..
        skip:
          - ASAdventurer.exe
          - CHECKSUM.txt
          - Start AS Adventurer.bat
          - .git
          - flatpak/build
          - flatpak/repo
          - flatpak/dist
          - flatpak/.flatpak-builder
          # Personal models — not for public Flatpak builds
          - public/assets/Elijah
          - public/assets/_personal
          - public/assets/_local
